# reusable workflow for build app
# Inspiration: https://philo.dev/how-to-use-github-actions-build-matrix-to-deploy-artifacts-to-multiple-servers/
name: Deployment

# With bran
on:
  push:
    branches:
      - main
    paths-ignore:
      - '*.md'

jobs:
  build-release:
    runs-on: self-hosted
    env:
      VITE_IDLE_TIMER_MIN: 30
      VITE_MAX_UPLOAD_SIZE_MB: 200
      VITE_AZURE_ENABLE_AUTH: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: echo "value=$(git describe --tags --always)" >> $GITHUB_OUTPUT

      - name: pnpm
        uses: pnpm/action-setup@v5
      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Copy .env
        run: php -r "file_exists('.env') || copy('.env.ci', '.env');"

      - name: Install PHP dependencies
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Generate key
        run: php artisan key:generate

      - name: Generate TypeScript types
        run: php artisan typescript:transform

      - name: Build
        run: pnpm run build
        env:
          VITE_APP_VERSION: ${{ steps.version.outputs.value }}

      - name: Create deployment artifact
        run: tar -czf /tmp/forge_${{github.sha}}.tar.gz --exclude=".git" --exclude="node_modules" *

  deploy-on-staging:
    runs-on: self-hosted
    needs: build-release
    environment: staging
    steps:
      - name: Upload to staging server
        uses: appleboy/scp-action@master
        with:
          source: /tmp/forge_${{github.sha}}.tar.gz
          target: /var/www/${{secrets.SERVER}}/html/artifacts
          host: ${{secrets.SERVER}}
          port: 22
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Extract archive and create directories
        uses: appleboy/ssh-action@master
        with:
          host: ${{secrets.SERVER}}
          port: 22
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            mkdir -p /var/www/${{secrets.SERVER}}/html/releases/${{github.sha}}
            tar -xzf /var/www/${{secrets.SERVER}}/html/artifacts/tmp/forge_${{github.sha}}.tar.gz -C /var/www/${{secrets.SERVER}}/html/releases/${{github.sha}}
            rm -rf /var/www/${{secrets.SERVER}}/html/releases/${{github.sha}}/storage

      - name: Run deploy hooks
        uses: appleboy/ssh-action@master
        env:
          RELEASE_PATH: /var/www/${{secrets.SERVER}}/html/releases/${{github.sha}}
          ACTIVE_RELEASE_PATH: /var/www/${{secrets.SERVER}}/html/current
          STORAGE_PATH: /var/www/${{secrets.SERVER}}/html/storage
          BASE_PATH: /var/www/${{secrets.SERVER}}/html
        with:
          host: ${{secrets.SERVER}}
          port: 22
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: RELEASE_PATH,ACTIVE_RELEASE_PATH,STORAGE_PATH,BASE_PATH
          script: |
            set -euo pipefail
            cd /var/www/${{secrets.SERVER}}/html/releases/${{github.sha}}
            ln -s -f $BASE_PATH/.env $RELEASE_PATH
            ln -s -f $STORAGE_PATH $RELEASE_PATH
             composer install --optimize-autoloader --no-interaction
             php artisan optimize:clear
             php artisan config:clear
             php artisan view:clear
             php artisan config:cache
             php artisan migrate --force
            ln -s -n -f $RELEASE_PATH $ACTIVE_RELEASE_PATH
            sudo chown -h forge.nginx $ACTIVE_RELEASE_PATH
            sudo chown -R forge.nginx $ACTIVE_RELEASE_PATH/
            sudo chown -R forge.nginx $STORAGE_PATH
            sudo chmod -R 771 $STORAGE_PATH
            sudo systemctl reload php8.4-fpm.service
            php artisan horizon:terminate

  deploy-on-production:
    runs-on: self-hosted
    needs: deploy-on-staging
    environment: production
    steps:
      - name: Upload to production server
        uses: appleboy/scp-action@master
        with:
          source: /tmp/forge_${{github.sha}}.tar.gz
          target: /var/www/${{secrets.SERVER}}/html/artifacts
          host: ${{secrets.SERVER}}
          port: 22
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Extract archive and create directories
        uses: appleboy/ssh-action@master
        with:
          host: ${{secrets.SERVER}}
          port: 22
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            mkdir -p /var/www/${{secrets.SERVER}}/html/releases/${{github.sha}}
            tar -xzf /var/www/${{secrets.SERVER}}/html/artifacts/tmp/forge_${{github.sha}}.tar.gz -C /var/www/${{secrets.SERVER}}/html/releases/${{github.sha}}
            rm -rf /var/www/${{secrets.SERVER}}/html/releases/${{github.sha}}/storage

      - name: Run deploy hooks
        uses: appleboy/ssh-action@master
        env:
          RELEASE_PATH: /var/www/${{secrets.SERVER}}/html/releases/${{github.sha}}
          ACTIVE_RELEASE_PATH: /var/www/${{secrets.SERVER}}/html/current
          STORAGE_PATH: /var/www/${{secrets.SERVER}}/html/storage
          BASE_PATH: /var/www/${{secrets.SERVER}}/html
        with:
          host: ${{secrets.SERVER}}
          port: 22
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: RELEASE_PATH,ACTIVE_RELEASE_PATH,STORAGE_PATH,BASE_PATH
          script: |
            set -euo pipefail
            cd /var/www/${{secrets.SERVER}}/html/releases/${{github.sha}}
            ln -s -f $BASE_PATH/.env $RELEASE_PATH
            ln -s -f $STORAGE_PATH $RELEASE_PATH
             composer install --optimize-autoloader --no-interaction
             php artisan optimize:clear
             php artisan config:clear
             php artisan view:clear
             php artisan config:cache
             php artisan migrate --force
            ln -s -n -f $RELEASE_PATH $ACTIVE_RELEASE_PATH
            sudo chown -h forge.nginx $ACTIVE_RELEASE_PATH
            sudo chown -R forge.nginx $ACTIVE_RELEASE_PATH/
            sudo chown -R forge.nginx $STORAGE_PATH
            sudo chmod -R 771 $STORAGE_PATH
            sudo systemctl reload php8.4-fpm.service
            php artisan horizon:terminate

      - name: Delete local artifact
        run: rm -f /tmp/forge_${{github.sha}}.tar.gz
